services:
  kotobank-mcp:
    image: ${KOTOBANK_MCP_IMAGE:-chouann/kotobank-mcp:latest}
    container_name: kotobank-mcp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      KOTOBANK_HOST: 0.0.0.0
      KOTOBANK_PORT: 3000
      KOTOBANK_AUTH_MODE: ${KOTOBANK_AUTH_MODE:-required}
      KOTOBANK_AUTH_TOKEN: ${KOTOBANK_AUTH_TOKEN:-}
      KOTOBANK_LOG_LEVEL: ${KOTOBANK_LOG_LEVEL:-info}
      KOTOBANK_REQUEST_TIMEOUT_MS: ${KOTOBANK_REQUEST_TIMEOUT_MS:-15000}
      KOTOBANK_SHUTDOWN_GRACE_PERIOD_MS: ${KOTOBANK_SHUTDOWN_GRACE_PERIOD_MS:-10000}
      KOTOBANK_CACHE_MODE: memory
      KOTOBANK_CACHE_TTL_MS: ${KOTOBANK_CACHE_TTL_MS:-300000}
      KOTOBANK_CACHE_MAX_ENTRIES: ${KOTOBANK_CACHE_MAX_ENTRIES:-512}
      KOTOBANK_RATE_LIMIT_WINDOW_MS: ${KOTOBANK_RATE_LIMIT_WINDOW_MS:-60000}
      KOTOBANK_RATE_LIMIT_MAX_REQUESTS: ${KOTOBANK_RATE_LIMIT_MAX_REQUESTS:-60}
